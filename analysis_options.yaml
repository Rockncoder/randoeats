include: package:very_good_analysis/analysis_options.yaml
analyzer:
  exclude:
    - lib/l10n/gen/*
    - "**/*.g.dart"
    - "**/*.freezed.dart"
linter:
  rules:
    public_member_api_docs: false

# Complexity gate. Thresholds are read by the standalone DCM CLI
# (https://dcm.dev), which runs in CI via `dcm analyze lib --fatal-warnings`.
# The discontinued `dart_code_metrics` pub package is NOT used (it is
# incompatible with the analyzer shipped in Dart 3.12).
dart_code_metrics:
  metrics:
    cyclomatic-complexity: 15
    maximum-nesting-level: 4
    number-of-parameters: 5
    source-lines-of-code: 50
  metrics-exclude:
    - test/**
  rules:
