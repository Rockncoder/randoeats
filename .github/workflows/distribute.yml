name: Build and Distribute

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'fastlane/**'
      - '.github/workflows/distribute.yml'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'both'
        type: choice
        options:
          - ios
          - android
          - both

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  # ============================================
  # Increment Build Number
  # ============================================
  increment-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      build_number: ${{ steps.bump.outputs.build_number }}

    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Increment build number
        id: bump
        run: |
          # Get current version line
          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          echo "Current: $VERSION_LINE"

          # Keep major.minor; the patch tracks the build number so the version
          # reads major.minor.<build> and increases by one on every push.
          BASE=$(echo $VERSION_LINE | sed 's/version: //' | cut -d'+' -f1)
          MAJOR_MINOR=$(echo $BASE | cut -d'.' -f1,2)
          CURRENT_BUILD=$(echo $VERSION_LINE | cut -d'+' -f2)
          NEW_BUILD=$((CURRENT_BUILD + 1))
          NEW_VERSION="${MAJOR_MINOR}.${NEW_BUILD}+${NEW_BUILD}"

          echo "Version: $BASE -> $NEW_VERSION (build $CURRENT_BUILD -> $NEW_BUILD)"

          # Update pubspec.yaml
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" pubspec.yaml

          # Output for other jobs
          echo "build_number=$NEW_BUILD" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit build number
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pubspec.yaml
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

  # ============================================
  # Android Build
  # ============================================
  android:
    needs: increment-build
    if: github.event.inputs.platform != 'ios'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create Google Services JSON
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Create keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/randoeats-release.keystore

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=upload
          storeFile=randoeats-release.keystore
          EOF

      - name: Create service account file
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" | base64 -d > firebase-service-account.json

      - name: Build and distribute
        env:
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          GOOGLE_SERVICE_ACCOUNT_KEY_PATH: firebase-service-account.json
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          # Google Maps SDK key — gradle reads MAPS_API_KEY from the env into the
          # manifest placeholder. Without it the map view crashes (New Area).
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: bundle exec fastlane android distribute

  # ============================================
  # iOS Build
  # ============================================
  ios:
    needs: increment-build
    if: github.event.inputs.platform != 'android'
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Pod install (with repo update)
        run: cd ios && bundle exec pod install --repo-update

      - name: Create GoogleService-Info.plist
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 -d > ios/Runner/GoogleService-Info.plist

      - name: Create Secrets.xcconfig (Google Maps SDK key)
        # GMSApiKey in Info.plist is $(MAPS_API_KEY) from this gitignored file;
        # without it GMSServices gets an empty key and the map view crashes
        # (tapping "New Area"). Empty when the secret is unset (map stays gray).
        run: echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" > ios/Flutter/Secrets.xcconfig

      - name: Create service account file
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" | base64 -d > firebase-service-account.json

      - name: Setup SSH for Match
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}

      - name: Build and distribute
        env:
          FIREBASE_APP_ID_IOS: ${{ secrets.FIREBASE_APP_ID_IOS }}
          GOOGLE_SERVICE_ACCOUNT_KEY_PATH: firebase-service-account.json
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: bundle exec fastlane ios distribute
