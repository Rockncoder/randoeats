name: Deploy Flutter Web to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  build-and-deploy:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Inject the web API key (referrer-restricted to randoeats.com) into the
      # Maps JS <script> tag. The key is never committed — index.html keeps the
      # YOUR_GOOGLE_MAPS_API_KEY placeholder and it's substituted only at build.
      - name: Inject web Maps JS API key
        run: |
          sed -i "s|YOUR_GOOGLE_MAPS_API_KEY|${{ secrets.WEB_API_KEY }}|g" web/index.html

      - name: Build Flutter Web
        run: |
          flutter build web \
            --release \
            -t lib/main_production.dart \
            --dart-define=GOOGLE_PLACES_API_KEY=${{ secrets.WEB_API_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=randoeats --commit-dirty=true
