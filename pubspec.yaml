name: randoeats
description: Your atomic-age appetite assistant
version: 1.0.79+79
publish_to: none

environment:
  sdk: ^3.10.0
  flutter: ^3.44.0

dependencies:
  animations: ^2.2.0
  dio: ^5.7.0
  equatable: ^2.0.7
  firebase_analytics: ^12.4.1
  firebase_core: ^4.11.0
  firebase_crashlytics: ^5.2.4
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  flutter_web_plugins:
    sdk: flutter
  geocoding: ^4.0.0
  geolocator: ^14.0.3
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  google_maps_flutter: ^2.17.1
  google_mobile_ads: ^7.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  in_app_purchase: ^3.3.0
  intl: ^0.20.2
  marionette_flutter: ^0.5.0
  package_info_plus: ^10.1.0
  permission_handler: ^12.0.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.4
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  marionette_mcp: ^0.5.0
  mocktail: ^1.0.5
  very_good_analysis: ^10.2.0

flutter:
  generate: true
  uses-material-design: true
  config:
    # google_mobile_ads is CocoaPods-only and pulls webview_flutter_wkwebview
    # transitively. Under SPM-mixed mode the wkwebview podspec gets skipped
    # and pod install can't resolve the dependency. Route everything via Pods.
    enable-swift-package-manager: false
  assets:
    - assets/images/

flutter_native_splash:
  color: "#F5F0E1"
  image: assets/images/rand-o-eats-new.png
  # iOS isn't circle-masked — scale the sign to fit the screen so it's large on
  # both iPhone and iPad (Android 12+ stays a fixed circular icon, OS-limited).
  ios_content_mode: scaleAspectFit
  android_12:
    color: "#F5F0E1"
    # Android 12+ masks the splash icon to a circle, so use a padded copy of
    # the sign that fits inside that circle (uncropped) instead of the full,
    # edge-to-edge image.
    image: assets/images/splash.png
  web: true
  ios: true
  android: true

flutter_launcher_icons:
  image_path: "assets/images/rand-o-eats-new.png"
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#F5F0E1"
  web:
    generate: true
    image_path: "assets/images/rand-o-eats-new.png"
    background_color: "#F5F0E1"
    theme_color: "#F5F0E1"
